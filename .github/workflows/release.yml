name: Release Package
on:
  push:
    branches:
      - master
    # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

env:
  CI: true
  PNPM_CACHE_FOLDER: .pnpm-store
  PACKAGE_DIR: packages/react-barcode-scanner

jobs:
  # ---------------------------------------------------------------------------
  # Publish to GitHub Packages as @jonsangarx/react-barcode-scanner
  # Only runs when the version in package.json differs from the published one
  # ---------------------------------------------------------------------------
  publish-github:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.1
          registry-url: 'https://npm.pkg.github.com'
          scope: '@jonsangarx'

      - name: Install pnpm
        run: npm i pnpm@latest -g

      - name: Setup pnpm config
        run: pnpm config set store-dir $PNPM_CACHE_FOLDER

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check version and publish
        run: |
          LOCAL_VERSION=$(node -p "require('./${PACKAGE_DIR}/package.json').version")
          echo "Local version: $LOCAL_VERSION"

          PUBLISHED_VERSION=$(npm view @jonsangarx/react-barcode-scanner version --registry https://npm.pkg.github.com/ 2>/dev/null || echo "none")
          echo "Published version: $PUBLISHED_VERSION"

          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "Version $LOCAL_VERSION already published. Nothing to do."
            exit 0
          fi

          echo "New version detected: $PUBLISHED_VERSION -> $LOCAL_VERSION"

          echo "Building..."
          pnpm --filter react-barcode-scanner build

          echo "Publishing to GitHub Packages..."
          cd ${PACKAGE_DIR}

          # Override package name and registry for GitHub Packages scope
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@jonsangarx/react-barcode-scanner';
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com/' };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

          npm publish --no-git-checks
          echo "Published @jonsangarx/react-barcode-scanner@${LOCAL_VERSION}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
